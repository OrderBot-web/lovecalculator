<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>💘 Love Calculator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#050505;
color:#fff;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#8b5cf655,transparent 30%),
radial-gradient(circle at 80% 70%,#00d4ff44,transparent 35%),
radial-gradient(circle at 50% 50%,#ff008044,transparent 40%);
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
to{transform:scale(1.2) rotate(6deg)}
}

.card{
position:relative;
z-index:10;
width:90%;
max-width:500px;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,.07);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.12);
box-shadow:0 0 40px #8b5cf655;
text-align:center;
}

h1{
font-size:2.4rem;
margin-bottom:10px;
}

p{
color:#ccc;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:8px 0;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.08);
color:white;
font-size:1rem;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:1rem;
font-weight:bold;
color:white;
background:linear-gradient(135deg,#8b5cf6,#ec4899);
}

button:hover{
transform:scale(1.02);
}

.result{
margin-top:25px;
}

.percent{
font-size:5rem;
font-weight:900;
text-shadow:0 0 20px #fff;
}

.shake{
animation:shake .12s infinite;
}

@keyframes shake{
0%{transform:translate(2px,2px)}
25%{transform:translate(-2px,2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-2px,-2px)}
100%{transform:translate(2px,2px)}
}

.fx{
position:fixed;
pointer-events:none;
z-index:9999;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<h1>💘 Love Calculator</h1>

<p>Scopri la compatibilità tra due persone</p>

<input id="n1" placeholder="Primo nome">
<input id="n2" placeholder="Secondo nome">

<button onclick="love()">
✨ Calcola Compatibilità
</button>

<div class="result" id="result"></div>

</div>

<script>

const phrases=[
"Interessante...",
"Potrebbe funzionare!",
"C'è del potenziale!",
"Molto promettente!",
"Chissà cosa riserva il destino!"
];

function hearts(){

for(let i=0;i<100;i++){

let h=document.createElement("div");

h.className="fx";
h.innerHTML="❤️";

h.style.left=Math.random()*innerWidth+"px";
h.style.top=innerHeight+"px";
h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

h.animate([
{transform:"translateY(0)",opacity:1},
{transform:"translateY(-120vh)",opacity:0}
],{
duration:3000+Math.random()*2000
});

setTimeout(()=>h.remove(),5000);
}
}

function fireworks(){

for(let i=0;i<500;i++){

let p=document.createElement("div");

p.className="fx";

p.style.width="8px";
p.style.height="8px";
p.style.borderRadius="50%";

p.style.background=
`hsl(${Math.random()*360},100%,70%)`;

let x=Math.random()*innerWidth;
let y=Math.random()*innerHeight;

p.style.left=x+"px";
p.style.top=y+"px";

document.body.appendChild(p);

p.animate([
{transform:"translate(0,0)",opacity:1},
{
transform:`translate(${Math.random()*800-400}px,
${Math.random()*800-400}px)`,
opacity:0
}
],{
duration:2500
});

setTimeout(()=>p.remove(),2500);

}
}

function stars(){

for(let i=0;i<150;i++){

let s=document.createElement("div");

s.className="fx";
s.innerHTML=["⭐","✨","🌟"][Math.floor(Math.random()*3)];

s.style.left=Math.random()*innerWidth+"px";
s.style.top="-50px";

document.body.appendChild(s);

s.animate([
{transform:"translateY(0)"},
{transform:"translateY(120vh)"}
],{
duration:4000
});

setTimeout(()=>s.remove(),4000);

}
}

function animateNumber(target,el){

let n=0;

const t=setInterval(()=>{

n+=Math.ceil(target/50);

if(n>=target){
n=target;
clearInterval(t);
}

el.innerHTML=n+"%";

},30);

}

function love(){

const a=document.getElementById("n1")
.value.trim().toLowerCase();

const b=document.getElementById("n2")
.value.trim().toLowerCase();

const r=document.getElementById("result");

const special=
(a==="tommaso" && b==="carlotta") ||
(a==="carlotta" && b==="tommaso");

if(special){

document.body.classList.add("shake");

setTimeout(()=>{
document.body.classList.remove("shake");
},8000);

for(let i=0;i<15;i++){
setTimeout(fireworks,i*400);
}

for(let i=0;i<20;i++){
setTimeout(hearts,i*250);
}

stars();

r.innerHTML=`
<div class="percent" id="p">0%</div>

<h2 style="
font-size:2rem;
margin-top:10px;
color:#ff80ff;
text-shadow:0 0 20px #ff00ff;">
👑💖 COPPIA LEGGENDARIA 💖👑
</h2>

<br>

<div style="line-height:1.8">

🚨 ATTENZIONE 🚨

<br><br>

Tommaso + Carlotta

<br><br>

Compatibilità fuori scala.

<br>

I matematici hanno rinunciato.

<br>

L'intelligenza artificiale
è andata in errore.

<br><br>

💍 MATRIMONIO RILEVATO DAL SISTEMA

<br><br>

🚀 LIVELLO AMORE:
GALATTICO

</div>
`;

document.getElementById("p").innerHTML="∞";

return;
}

const perc=Math.floor(Math.random()*99)+1;

const phrase=
phrases[Math.floor(Math.random()*phrases.length)];

r.innerHTML=`
<div class="percent" id="p">0%</div>
<div style="margin-top:10px">${phrase}</div>
`;

animateNumber(
perc,
document.getElementById("p")
);

}
</script>

</body>
</html>
