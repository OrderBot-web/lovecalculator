<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Love Test AI</title>

<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
min-height:100dvh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#050505;
color:white;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(132,94,247,.35),transparent 30%),
radial-gradient(circle at 80% 70%,rgba(0,174,255,.25),transparent 35%),
radial-gradient(circle at 50% 50%,rgba(255,0,128,.12),transparent 40%);
animation:move 10s infinite alternate ease-in-out;
}

@keyframes move{
to{
transform:scale(1.2) rotate(8deg);
}
}

.card{
position:relative;
z-index:10;
width:90%;
max-width:450px;
padding:30px;
border-radius:28px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.12);
box-shadow:
0 0 40px rgba(123,97,255,.3),
inset 0 0 25px rgba(255,255,255,.04);
}

h1{
font-size:2.3rem;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#bbb;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.08);
color:white;
font-size:1rem;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
font-size:1rem;
font-weight:700;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#7b61ff,#a855f7);
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

button:active{
transform:scale(.98);
}

.loader{
display:none;
height:8px;
margin-top:20px;
background:rgba(255,255,255,.08);
border-radius:999px;
overflow:hidden;
}

.loader div{
height:100%;
width:0;
background:linear-gradient(90deg,#7b61ff,#00d4ff);
}

.result{
text-align:center;
margin-top:25px;
}

.percent{
font-size:5rem;
font-weight:900;
background:linear-gradient(90deg,#fff,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.message{
margin-top:10px;
font-size:1.1rem;
}

.bigheart{
font-size:90px;
animation:heartbeat 1s infinite;
}

@keyframes heartbeat{
50%{
transform:scale(1.2);
}
}

.particle{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
animation:explode 3s linear forwards;
}

@keyframes explode{
to{
transform:
translate(var(--x),var(--y))
scale(0);
opacity:0;
}
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="card">

<h1>❤️ Love Test AI</h1>

<div class="subtitle">
Scopri la compatibilità tra due persone
</div>

<input id="name1" placeholder="Nome 1">
<input id="name2" placeholder="Nome 2">

<button onclick="startTest()">
✨ Calcola Compatibilità
</button>

<div class="loader" id="loader">
<div id="bar"></div>
</div>

<div class="result" id="result"></div>

</div>

<script>

const phrases=[
"Interessante...",
"Potrebbe funzionare!",
"C'è del potenziale!",
"Molto promettente!",
"Chissà cosa riserva il destino!"
];

function animateNumber(target,element){

let current=0;

const interval=setInterval(()=>{

current++;

element.innerHTML=current+"%";

if(current>=target){
clearInterval(interval);
}

},20);

}

function fireworks(){

for(let i=0;i<250;i++){

const p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*window.innerWidth+"px";
p.style.top=Math.random()*window.innerHeight+"px";

p.style.background=
`hsl(${Math.random()*360},100%,70%)`;

p.style.setProperty(
'--x',
(Math.random()*800-400)+'px'
);

p.style.setProperty(
'--y',
(Math.random()*800-400)+'px'
);

document.body.appendChild(p);

setTimeout(()=>p.remove(),3000);

}
}

function hearts(){

for(let i=0;i<100;i++){

const h=document.createElement("div");

h.innerHTML="❤️";

h.className="particle";

h.style.fontSize=(20+Math.random()*30)+"px";

h.style.left=Math.random()*window.innerWidth+"px";
h.style.top=window.innerHeight+"px";

h.style.setProperty('--x',
(Math.random()*300-150)+'px');

h.style.setProperty('--y',
(-window.innerHeight-300)+'px');

document.body.appendChild(h);

setTimeout(()=>h.remove(),3000);

}
}

function startTest(){

const n1=document.getElementById("name1").value.trim().toLowerCase();
const n2=document.getElementById("name2").value.trim().toLowerCase();

const loader=document.getElementById("loader");
const bar=document.getElementById("bar");
const result=document.getElementById("result");

result.innerHTML="";
loader.style.display="block";

bar.style.width="0";

let progress=0;

const loading=setInterval(()=>{

progress+=5;
bar.style.width=progress+"%";

if(progress>=100){

clearInterval(loading);

loader.style.display="none";

special=
(n1==="tommaso" && n2==="carlotta") ||
(n1==="carlotta" && n2==="tommaso");

if(special){

result.innerHTML=
`
<div class="bigheart">❤️</div>

<div class="percent" id="num">0%</div>

<div class="message">
<h2>💖 COPPIA LEGGENDARIA 💖</h2>
<br>
Cosa incredibile!<br>
Tommaso e Carlotta hanno una compatibilità fuori scala.<br>
Le stelle non riescono nemmeno a misurarla.
</div>
`;

animateNumber(
100,
document.getElementById("num")
);

fireworks();
hearts();

}else{

const percentage=
Math.floor(Math.random()*99)+1;

const phrase=
phrases[Math.floor(Math.random()*phrases.length)];

result.innerHTML=
`
<div class="percent" id="num">0%</div>
<div class="message">${phrase}</div>
`;

animateNumber(
percentage,
document.getElementById("num")
);

}

}

},100);

}

</script>

</body>
</html>
