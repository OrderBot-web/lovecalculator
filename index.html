<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Love Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#050505;
color:white;
transition:1s;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#8b5cf655,transparent 30%),
radial-gradient(circle at 80% 70%,#00d4ff44,transparent 35%),
radial-gradient(circle at 50% 50%,#ff008044,transparent 40%);
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
to{
transform:scale(1.2) rotate(8deg);
}
}

.card{
position:relative;
z-index:10;
width:90%;
max-width:500px;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 0 40px rgba(139,92,246,.4);
text-align:center;
}

h1{
font-size:2.5rem;
margin-bottom:10px;
}

p{
color:#ccc;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:8px 0;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.08);
color:white;
font-size:1rem;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#8b5cf6,#ec4899);
}

.result{
margin-top:25px;
}

.percent{
font-size:5rem;
font-weight:900;
text-shadow:0 0 25px white;
}

.fx{
position:fixed;
pointer-events:none;
z-index:9999;
}

.shake{
animation:shake .1s infinite;
}

@keyframes shake{
0%{transform:translate(2px,2px);}
25%{transform:translate(-2px,2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,-2px);}
100%{transform:translate(2px,2px);}
}

@keyframes rainbow{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<h1>💘 Love Calculator</h1>

<p>Scopri la compatibilità tra due persone</p>

<input id="n1" placeholder="Primo nome">
<input id="n2" placeholder="Secondo nome">

<button onclick="love()">
✨ Calcola Compatibilità
</button>

<div class="result" id="result"></div>

</div>

<script>

let stopEffects=false;

const phrases=[
"Interessante...",
"Potrebbe funzionare!",
"C'è del potenziale!",
"Molto promettente!",
"Chissà cosa riserva il destino!"
];

function hearts(){

if(stopEffects) return;

const icons=[
"💖","💘","💕","💞",
"💓","💗","💝","❤️‍🔥"
];

for(let i=0;i<120;i++){

let h=document.createElement("div");

h.className="fx";

h.innerHTML=
icons[Math.floor(Math.random()*icons.length)];

h.style.left=Math.random()*innerWidth+"px";
h.style.top=innerHeight+"px";

h.style.fontSize=
(20+Math.random()*50)+"px";

h.style.filter=
"drop-shadow(0 0 10px #ff00ff) drop-shadow(0 0 25px #ff00ff)";

document.body.appendChild(h);

h.animate([
{
transform:"translateY(0) rotate(0deg)",
opacity:1
},
{
transform:
`translateY(-120vh) rotate(${Math.random()*720}deg)`,
opacity:0
}
],{
duration:3000+Math.random()*3000
});

setTimeout(()=>h.remove(),6000);

}
}

function fireworks(){

if(stopEffects) return;

for(let i=0;i<800;i++){

let p=document.createElement("div");

p.className="fx";

p.style.width="8px";
p.style.height="8px";
p.style.borderRadius="50%";

p.style.background=
`hsl(${Math.random()*360},100%,70%)`;

p.style.boxShadow=
"0 0 15px currentColor";

let x=Math.random()*innerWidth;
let y=Math.random()*innerHeight;

p.style.left=x+"px";
p.style.top=y+"px";

document.body.appendChild(p);

p.animate([
{
transform:"translate(0,0)",
opacity:1
},
{
transform:
`translate(${Math.random()*1200-600}px,
${Math.random()*1200-600}px)`,
opacity:0
}
],{
duration:3000
});

setTimeout(()=>p.remove(),3000);

}
}

function stars(){

if(stopEffects) return;

const icons=["⭐","✨","🌟"];

for(let i=0;i<150;i++){

let s=document.createElement("div");

s.className="fx";

s.innerHTML=
icons[Math.floor(Math.random()*3)];

s.style.left=
Math.random()*innerWidth+"px";

s.style.top="-50px";

s.style.fontSize=
(15+Math.random()*20)+"px";

document.body.appendChild(s);

s.animate([
{transform:"translateY(0)"},
{transform:"translateY(120vh)"}
],{
duration:4000
});

setTimeout(()=>s.remove(),4000);

}
}

function animateNumber(target,el){

let n=0;

const timer=setInterval(()=>{

n+=Math.ceil(target/50);

if(n>=target){
n=target;
clearInterval(timer);
}

el.innerHTML=n+"%";

},30);
}

document.body.addEventListener("click",()=>{

if(!stopEffects) return;

document.body.classList.remove("shake");
document.body.style.animation="";

document
.querySelectorAll(".fx")
.forEach(x=>x.remove());

});

function love(){

stopEffects=false;

const a=
document.getElementById("n1")
.value.trim().toLowerCase();

const b=
document.getElementById("n2")
.value.trim().toLowerCase();

const r=
document.getElementById("result");

if(!a || !b){

r.innerHTML=`
<div style="
padding:15px;
border-radius:15px;
background:#ff000022;
border:1px solid #ff4444;
color:#ff9999;">
⚠️ Inserisci entrambi i nomi
</div>
`;

return;
}

if(a===b){

r.innerHTML=`
<div class="percent">🤨</div>

<div>
Il Love Calculator non è ancora pronto
per questo livello di autostima.
</div>
`;

return;
}

const special=
(a==="tommaso" && b==="carlotta") ||
(a==="carlotta" && b==="tommaso");

if(special){

stopEffects=true;

document.body.classList.add("shake");
document.body.style.animation=
"rainbow .4s linear infinite";

for(let i=0;i<25;i++){
setTimeout(()=>fireworks(),i*300);
}

for(let i=0;i<25;i++){
setTimeout(()=>hearts(),i*250);
}

for(let i=0;i<10;i++){
setTimeout(()=>stars(),i*500);
}

r.innerHTML=`

<div style="font-size:100px">
👑❤️👑
</div>

<div class="percent"
style="
font-size:7rem;
text-shadow:
0 0 20px white,
0 0 40px #ff00ff,
0 0 80px #ff00ff;">
∞
</div>

<h2 style="
font-size:2rem;
color:#ff9eff;
text-shadow:
0 0 20px #ff00ff;">
💖 COPPIA LEGGENDARIA 💖
</h2>

<br>

<div style="line-height:1.9">

🚨 ATTENZIONE 🚨

<br><br>

Tommaso + Carlotta

<br><br>

Compatibilità fuori scala.

<br>

I matematici hanno rinunciato.

<br>

L'intelligenza artificiale
è andata in errore.

<br><br>

💍 MATRIMONIO RILEVATO DAL SISTEMA

<br><br>

🚀 LIVELLO AMORE:
GALATTICO

<br><br>

⚠️ ERRORE CRITICO

<br>

Valore rilevato:

<br><br>

<b style="font-size:2rem">
999999999999%
</b>

<br><br>

<small>
Tocca lo schermo per fermare il caos.
</small>

</div>
`;

return;
}

const perc=
Math.floor(Math.random()*99)+1;

const phrase=
phrases[Math.floor(Math.random()*phrases.length)];

r.innerHTML=`
<div class="percent" id="p">0%</div>

<div style="margin-top:10px">
${phrase}
</div>
`;

animateNumber(
perc,
document.getElementById("p")
);
}
</script>

</body>
</html>
